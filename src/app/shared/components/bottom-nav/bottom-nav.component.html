@if (showNav) {
<div class="fixed bottom-0 left-0 w-full z-50 px-4 pb-2 pt-1 pointer-events-none">
    <div
        class="bg-[#1A0A2E]/90 backdrop-blur-xl border border-[#31204F] rounded-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.3)] mx-auto max-w-md pointer-events-auto flex justify-between items-center px-6 py-2">

        <!-- Inicio (Home) -->
        <a routerLink="/home"
            class="flex flex-col items-center justify-center gap-1 min-w-[3.5rem] transition-all relative"
            [class.text-[#C30364]]="isActive('/home')" [class.text-[#9D96A8]]="!isActive('/home')">
            <!-- Glow active -->
            @if (isActive('/home')) {
            <div class="absolute -top-1 w-8 h-8 bg-[#C30364] blur-xl opacity-40 rounded-full"></div>
            }
            <svg class="w-6 h-6 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-[10px] font-semibold tracking-wide"
                [ngClass]="{'font-bold': isActive('/home')}">Inicio</span>
        </a>

        <!-- Carrito -->
        <a [routerLink]="getCartRoute()"
            class="flex flex-col items-center justify-center gap-1 min-w-[3.5rem] transition-all relative"
            [class.text-[#C30364]]="isActive('/cart')" [class.text-[#9D96A8]]="!isActive('/cart')">
            <div class="relative">
                @if (isActive('/cart') || isActive('/food/cart') || isActive('/liquor/cart')) {
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                } @else {
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                }
                
                @if (cartItemCount > 0) {
                    <span class="absolute -top-1.5 -right-2 bg-[#C30364] text-white text-[10px] font-bold rounded-full min-w-[16px] h-[16px] flex items-center justify-center px-1 border-2 border-[#1A0A2E]">
                        {{ cartItemCount }}
                    </span>
                }
            </div>
            <span class="text-[10px] font-semibold tracking-wide"
                [ngClass]="{'font-bold': isActive('/cart')}">Carrito</span>
        </a>

        <!-- Botón Central (Pedidos Activos/Realizados) -->
        <a routerLink="/orders" class="relative group pointer-events-auto">
            <div [class.animate-soft-blink]="shouldBlinkOrders()"
                class="w-12 h-12 rounded-full bg-gradient-cta flex items-center justify-center shadow-[0_4px_15px_rgba(195,3,100,0.5)] border-2 border-[#1A0A2E] transform group-hover:scale-105 transition-all">
                <!-- Ícono de Delivery/Pedidos -->
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
        </a>

        <!-- Billetera -->
        <a routerLink="/wallet"
            class="flex flex-col items-center justify-center gap-1 min-w-[3.5rem] transition-all relative"
            [class.text-[#C30364]]="isActive('/wallet')" [class.text-[#9D96A8]]="!isActive('/wallet')">
            @if (isActive('/wallet')) {
            <div class="absolute -top-1 w-8 h-8 bg-[#C30364] blur-xl opacity-40 rounded-full"></div>
            }
            <svg class="w-6 h-6 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
            <span class="text-[10px] font-semibold tracking-wide"
                [ngClass]="{'font-bold': isActive('/wallet')}">Billetera</span>
        </a>

        <!-- Perfil -->
        <a routerLink="/profile"
            class="flex flex-col items-center justify-center gap-1 min-w-[3.5rem] transition-all relative"
            [class.text-[#C30364]]="isActive('/profile')" [class.text-[#9D96A8]]="!isActive('/profile')">
            @if (isActive('/profile')) {
            <div class="absolute -top-1 w-8 h-8 bg-[#C30364] blur-xl opacity-40 rounded-full"></div>
            }
            <svg class="w-6 h-6 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="text-[10px] font-semibold tracking-wide"
                [ngClass]="{'font-bold': isActive('/profile')}">Perfil</span>
        </a>

    </div>
</div>
}
